name: seo-tools

services:
  postgres:
    image: postgres:16
    container_name: seo-tools-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-seo_tools}
    ports:
      - "${POSTGRES_PORT:-15432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  identity-service:
    build:
      context: ..
      dockerfile: services/IdentityService/Dockerfile
    container_name: seo-tools-identity-service
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Development}
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=${POSTGRES_DB:-seo_tools};Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD}
      Smtp__Host: ${SMTP_HOST}
      Smtp__Port: ${SMTP_PORT:-587}
      Smtp__EnableSsl: ${SMTP_ENABLE_SSL:-true}
      Smtp__Username: ${SMTP_USERNAME}
      Smtp__Password: ${SMTP_PASSWORD}
      Smtp__FromEmail: ${SMTP_FROM_EMAIL}
      Smtp__FromName: ${SMTP_FROM_NAME:-SEO Tools}
      Frontend__RedirectUrl: ${FRONTEND_REDIRECT_URL:-http://localhost/register/complete}
      Jwt__PrivateKeyBase64: ${JWT_PRIVATE_KEY_BASE64}
      Jwt__PublicKeyBase64: ${JWT_PUBLIC_KEY_BASE64}
      Jwt__Issuer: ${JWT_ISSUER:-seo_tools}
      Jwt__Audience: ${JWT_AUDIENCE:-seo_tools}
      Redis__ConnectionString: redis:6379
    ports:
      - "${IDENTITY_SERVICE_PORT:-5001}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
  redis:
    image: redis:7-alpine
    container_name: seo-tools-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: seo-tools-redis-commander
    restart: unless-stopped
    environment:
      - REDIS_HOSTS=local:redis:6379
    ports:
      - "${REDIS_COMMANDER_PORT:-8081}:8081"
    depends_on:
      - redis
      
  frontend:
    build:
      context: ../../frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_BASE_URL=${VITE_API_BASE_URL:-http://localhost:5001}
    container_name: seo-tools-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      - identity-service

volumes:
  postgres_data:
  redis_data:
